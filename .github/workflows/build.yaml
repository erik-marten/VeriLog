name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: VeriLogJava

    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/wrapper-validation@v3

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - uses: gradle/actions/setup-gradle@v3

      - name: Build + tests + coverage
        run: ./gradlew --no-daemon clean test jacocoTestReport build

      - name: Upload build artifacts (JARs)
        uses: actions/upload-artifact@v4
        with:
          name: verilogjava-build
          path: VeriLogJava/build/libs/*.jar
          if-no-files-found: error

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            VeriLogJava/build/reports/jacoco/test/html/**
            VeriLogJava/build/reports/jacoco/test/jacocoTestReport.xml

  sonar:
    runs-on: ubuntu-latest
    needs: build-test

    defaults:
      run:
        working-directory: VeriLogJava

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # wichtig für bessere Sonar Relevanz

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - uses: gradle/actions/setup-gradle@v3

      - name: Build + coverage (for Sonar)
        run: ./gradlew --no-daemon clean test jacocoTestReport

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
